<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — Frozen Larna Cake</title>
<link rel="icon" href="favicon.gif" type="image/gif">
<script>
const API_BASE = "https://larnaapi.yai-taweewoot.workers.dev";

(function(){
  if (!sessionStorage.getItem("dash_token")) {
    document.addEventListener("DOMContentLoaded", function() {
      document.body.style.display = "none";
      var overlay = document.createElement("div");
      overlay.id = "pin-overlay";
      overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:#2B1810;display:flex;align-items:center;justify-content:center;z-index:9999;">
          <div style="background:#fff;border-radius:20px;padding:40px 32px;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);">
            <div style="font-size:32px;margin-bottom:8px;">🔐</div>
            <h2 style="font-size:18px;font-weight:800;color:#2B1810;margin-bottom:4px;">Larna Dashboard</h2>
            <p style="font-size:13px;color:#888;margin-bottom:24px;">กรอก PIN เพื่อเข้าใช้งาน</p>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="6"
              style="width:100%;text-align:center;font-size:28px;letter-spacing:8px;border:2px solid #e0d0c0;border-radius:12px;padding:12px;outline:none;color:#2B1810;"
              placeholder="••••••">
            <p id="pin-error" style="color:#c0392b;font-size:13px;margin-top:12px;display:none;">PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
            <button onclick="checkPin()" style="margin-top:20px;width:100%;background:#2B1810;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.body.style.display = "";
      setTimeout(() => document.getElementById("pin-input").focus(), 100);
      document.getElementById("pin-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") checkPin();
      });
    });
  }
  window.checkPin = async function() {
    var input = document.getElementById("pin-input");
    var errorEl = document.getElementById("pin-error");
    errorEl.style.display = "none";
    try {
      const res = await fetch(API_BASE + "/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: input.value }),
      });
      const data = await res.json();
      if (data.success && data.token) {
        sessionStorage.setItem("dash_token", data.token);
        document.getElementById("pin-overlay").remove();
        init();
      } else {
        errorEl.style.display = "";
        input.value = ""; input.focus();
      }
    } catch (e) {
      errorEl.textContent = "เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง";
      errorEl.style.display = "";
    }
  };
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root {
    --choco-dark: #2B1810;
    --choco: #5C3317;
    --frost: #2A9FC9;
    --cream: #FDF6EE;
    --cream-2: #F0E6D6;
    --gold: #D4A64A;
    --green: #27ae60;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--cream); color: var(--choco-dark); min-height: 100vh; }

  header {
    background: var(--choco-dark);
    color: #fff;
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 800; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 14px; }
  #lastUpdated { font-size: 12px; opacity: 0.5; }
  .refresh-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.22); }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  /* Stat cards */
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #fff;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 2px 12px rgba(43,24,16,0.07);
  }
  .stat-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--choco);
    opacity: 0.5;
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 32px;
    font-weight: 900;
    color: var(--choco-dark);
    line-height: 1;
  }
  .stat-unit { font-size: 13px; font-weight: 400; opacity: 0.45; margin-top: 4px; }
  .stat-card.highlight { background: var(--choco-dark); }
  .stat-card.highlight .stat-label { color: #fff; }
  .stat-card.highlight .stat-value { color: #fff; }
  .stat-card.highlight .stat-unit { color: rgba(255,255,255,0.5); }

  /* Charts */
  .charts { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; margin-bottom: 24px; }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 22px 24px;
    box-shadow: 0 2px 12px rgba(43,24,16,0.07);
  }
  .card h3 {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 18px;
    color: var(--choco-dark);
  }

  /* Today list */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .section-header h3 { font-size: 14px; font-weight: 700; }
  .count-badge {
    background: var(--frost);
    color: #fff;
    border-radius: 999px;
    padding: 2px 12px;
    font-size: 12px;
    font-weight: 700;
  }

  .order-row {
    border-bottom: 1px solid var(--cream-2);
    padding: 14px 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px 16px;
    align-items: start;
  }
  .order-row:last-child { border-bottom: none; }
  .order-name { font-weight: 700; font-size: 14px; }
  .order-meta { font-size: 12px; color: var(--choco); opacity: 0.55; margin-top: 3px; }
  .order-items { font-size: 13px; color: var(--choco); margin-top: 5px; }
  .order-note { font-size: 12px; color: #888; margin-top: 3px; }
  .order-total {
    font-size: 15px;
    font-weight: 800;
    color: var(--choco-dark);
    white-space: nowrap;
  }

  .status-badge {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: opacity .15s, transform .1s;
    user-select: none;
  }
  .status-badge:hover { opacity: 0.75; transform: scale(1.04); }
  .status-badge:active { transform: scale(0.97); }
  .status-รอยืนยัน   { background: #fff3cd; color: #856404; }
  .status-จัดเตรียมแล้ว { background: #cce5ff; color: #004085; }
  .status-ส่งแล้ว    { background: #d4edda; color: #155724; }
  .order-row.sent .order-name,
  .order-row.sent .order-items { opacity: 0.4; }

  .empty {
    text-align: center;
    color: var(--choco);
    opacity: 0.35;
    padding: 32px 0;
    font-size: 14px;
  }

  .loading-state {
    text-align: center;
    padding: 80px 0;
    color: var(--choco);
    opacity: 0.4;
    font-size: 15px;
  }
  .error-state {
    background: #fff0f0;
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    color: #c0392b;
    font-size: 14px;
    margin-top: 20px;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(43,24,16,0.45);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 28px;
    width: 100%;
    max-width: 640px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 8px 40px rgba(43,24,16,0.18);
    position: relative;
  }
  .modal h3 { font-size: 16px; font-weight: 800; margin-bottom: 18px; }
  .modal-close {
    position: absolute;
    top: 18px; right: 20px;
    background: var(--cream-2);
    border: none;
    border-radius: 50%;
    width: 32px; height: 32px;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
  }
  .stat-card { cursor: pointer; transition: box-shadow .15s, transform .15s; }
  .stat-card:hover { box-shadow: 0 4px 20px rgba(43,24,16,0.14); transform: translateY(-2px); }

  @media (max-width: 680px) {
    .charts { grid-template-columns: 1fr; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 400px) {
    .stats { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1>📊 Frozen Larna Cake — ยอดขาย</h1>
  <div class="header-right">
    <span id="lastUpdated">กำลังโหลด...</span>
    <button class="refresh-btn" onclick="init()">🔄 รีเฟรช</button>
  </div>
</header>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
  </div>
</div>

<div class="container">
  <div id="content"><div class="loading-state">กำลังโหลดข้อมูล...</div></div>
</div>

<script>
let dailyChart, flavorChart, allOrders = [];

function openModal(type) {
  const overlay = document.getElementById("modalOverlay");
  const title = document.getElementById("modalTitle");
  const body = document.getElementById("modalBody");

  if (type === "all") {
    title.textContent = "📋 ออเดอร์ทั้งหมด";
    body.innerHTML = allOrders.length === 0
      ? '<div class="empty">ยังไม่มีออเดอร์</div>'
      : allOrders.slice().reverse().map(o => orderRowHTML(o)).join("");
  } else if (type === "today") {
    const today = todayISO();
    const todayList = allOrders.filter(isTodayOrder);
    title.textContent = "🚚 รายการจัดส่งวันนี้";
    body.innerHTML = todayList.length === 0
      ? '<div class="empty">ยังไม่มีออเดอร์สำหรับวันนี้</div>'
      : todayList.map(o => `
        <div class="order-row">
          <div>
            <div class="order-name">${o.name || "-"}</div>
            <div class="order-meta">📞 ${o.phone || "-"} &nbsp;·&nbsp; 📍 ${o.address || "-"}</div>
            <div class="order-items">🛍 ${o.items || "-"}</div>
            ${o.note && o.note !== "-" ? `<div class="order-note">📝 ${o.note}</div>` : ""}
          </div>
          <div class="order-total">${o.total}</div>
        </div>`).join("");
  } else if (type === "revenue") {
    title.textContent = "💰 ยอดขายรวม — แยกตามเดือน";
    const monthMap = {};
    allOrders.forEach(o => {
      const ts = parseTimestamp(o.timestamp);
      if (!ts) return;
      const key = ts.toLocaleDateString("th-TH", { month: "long", year: "numeric" });
      monthMap[key] = (monthMap[key] || 0) + parseTotal(o.total);
    });
    const rows = Object.entries(monthMap).reverse().map(([m, v]) =>
      `<div class="order-row"><div class="order-name">${m}</div><div class="order-total">${v.toLocaleString("th-TH")} THB</div></div>`
    ).join("");
    body.innerHTML = rows || '<div class="empty">ไม่มีข้อมูล</div>';
  } else if (type === "flavors") {
    title.textContent = "🏆 รสชาติขายดี — จำนวนทั้งหมด";
    const fm = {};
    allOrders.forEach(o => {
      parseItems(o.items).forEach(({name, qty}) => { fm[name] = (fm[name] || 0) + qty; });
    });
    const rows = Object.entries(fm).sort((a,b) => b[1]-a[1]).map(([name, qty]) =>
      `<div class="order-row"><div class="order-name">${name}</div><div class="order-total">${qty} ชิ้น</div></div>`
    ).join("");
    body.innerHTML = rows || '<div class="empty">ไม่มีข้อมูล</div>';
  }

  overlay.classList.add("open");
}

function closeModal(e) {
  if (e && e.target !== document.getElementById("modalOverlay") && e.target !== document.querySelector(".modal-close")) return;
  document.getElementById("modalOverlay").classList.remove("open");
}

document.addEventListener("keydown", e => { if (e.key === "Escape") document.getElementById("modalOverlay").classList.remove("open"); });

const STATUS_CYCLE = ["รอยืนยัน", "จัดเตรียมแล้ว", "ส่งแล้ว"];

function orderRowHTML(o) {
  const status = o.status || "รอยืนยัน";
  const row = String(o._row || "");
  return `
    <div class="order-row${status === 'ส่งแล้ว' ? ' sent' : ''}">
      <div>
        <div class="order-name">${o.name || "-"}</div>
        <div class="order-meta">📞 ${o.phone || "-"} &nbsp;·&nbsp; 📍 ${o.address && o.address !== "-" ? o.address : "รับที่ร้าน"}</div>
        <div class="order-items">🛍 ${o.items || "-"}</div>
        ${o.note && o.note !== "-" ? `<div class="order-note">📝 ${o.note}</div>` : ""}
        <button class="status-badge status-${status}" onclick="updateStatus(this,'${row}')">${status}</button>
      </div>
      <div class="order-total">${o.total}</div>
    </div>`;
}

async function updateStatus(btn, row) {
  const current = btn.textContent.trim();
  const next = STATUS_CYCLE[(STATUS_CYCLE.indexOf(current) + 1) % STATUS_CYCLE.length];
  btn.textContent = next;
  btn.className = `status-badge status-${next}`;
  const orderRow = btn.closest(".order-row");
  if (orderRow) orderRow.classList.toggle("sent", next === "ส่งแล้ว");
  if (!row) return;
  try {
    const token = sessionStorage.getItem("dash_token");
    await fetch(API_BASE + "/api/admin/update-status", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify({ row: Number(row), status: next }),
    });
  } catch(e) { console.log("Status update failed:", e); }
}

function todayISO() {
  const d = new Date();
  return d.toISOString().slice(0, 10);
}

function parseTimestamp(str) {
  if (!str || str === "-") return null;
  const d = new Date(str);
  if (!isNaN(d)) {
    if (d.getFullYear() > 2500) {
      return new Date(d.getFullYear() - 543, d.getMonth(), d.getDate(), d.getHours(), d.getMinutes(), d.getSeconds());
    }
    return d;
  }
  // Thai locale format: "D/M/YYYY HH:MM:SS" with Buddhist year (e.g. "2/7/2569 17:37:21")
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) {
    const year = parseInt(m[3]) > 2500 ? parseInt(m[3]) - 543 : parseInt(m[3]);
    return new Date(year, parseInt(m[2]) - 1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]), parseInt(m[6] || 0));
  }
  return null;
}

function parseTotal(str) {
  return parseInt((str || "0").toString().replace(/[^0-9]/g, "")) || 0;
}

function parseItems(str) {
  return (str || "").split(",").map(s => {
    const m = s.trim().match(/^(.+?)\s*x(\d+)$/i);
    if (!m) return null;
    return { name: m[1].trim(), qty: parseInt(m[2]) };
  }).filter(Boolean);
}

function isTodayOrder(o) {
  const today = todayISO();
  if (o.date && o.date !== "-" && String(o.date).slice(0, 10) === today) return true;
  const ts = parseTimestamp(o.timestamp);
  return ts ? ts.toISOString().slice(0, 10) === today : false;
}

function getOrderDate(o) {
  if (o.date && o.date !== "-") {
    const d = parseTimestamp(o.date);
    if (d) return d.toISOString().slice(0, 10);
  }
  const ts = parseTimestamp(o.timestamp);
  return ts ? ts.toISOString().slice(0, 10) : null;
}

function isUpcomingOrder(o) {
  const d = getOrderDate(o);
  return d && d > todayISO() && o.status !== "ส่งแล้ว";
}

function formatDateTH(iso) {
  return new Date(iso + "T12:00:00").toLocaleDateString("th-TH", { weekday: "long", day: "numeric", month: "long" });
}

async function loadData() {
  const token = sessionStorage.getItem("dash_token");
  const res = await fetch(API_BASE + "/api/admin/orders", {
    headers: { Authorization: `Bearer ${token}` },
  });
  if (res.status === 401) {
    sessionStorage.removeItem("dash_token");
    location.reload();
    throw new Error("Unauthorized");
  }
  const json = await res.json();
  return (json.orders || []).map(o => {
    const normalized = {};
    Object.keys(o).forEach(k => normalized[k.toLowerCase()] = o[k]);
    return normalized;
  });
}

function render(orders) {
  allOrders = orders;
  const today = todayISO();

  // Summary stats
  const totalRevenue = orders.reduce((s, o) => s + parseTotal(o.total), 0);
  const totalOrders = orders.length;
  const todayOrders = orders.filter(isTodayOrder);
  const avgOrder = totalOrders ? Math.round(totalRevenue / totalOrders) : 0;

  // Upcoming orders grouped by date
  const upcomingOrders = orders.filter(isUpcomingOrder);
  const upcomingByDate = {};
  upcomingOrders.forEach(o => {
    const d = getOrderDate(o);
    if (!upcomingByDate[d]) upcomingByDate[d] = [];
    upcomingByDate[d].push(o);
  });
  const upcomingHTML = Object.keys(upcomingByDate).sort().map(d => `
    <div class="card" style="margin-top:20px;">
      <div class="section-header">
        <h3>📅 ${formatDateTH(d)}</h3>
        <span class="count-badge">${upcomingByDate[d].length} ออเดอร์</span>
      </div>
      ${upcomingByDate[d].map(o => orderRowHTML(o)).join("")}
    </div>`).join("") || "";

  // Flavor counts
  const flavorMap = {};
  orders.forEach(o => {
    parseItems(o.items).forEach(({name, qty}) => {
      flavorMap[name] = (flavorMap[name] || 0) + qty;
    });
  });
  const flavors = Object.entries(flavorMap).sort((a,b) => b[1]-a[1]).slice(0, 7);

  // Daily sales — last 14 days
  const dailyMap = {};
  orders.forEach(o => {
    const ts = parseTimestamp(o.timestamp);
    if (!ts) return;
    const d = ts.toISOString().slice(0, 10);
    dailyMap[d] = (dailyMap[d] || 0) + parseTotal(o.total);
  });
  const days = Array.from({ length: 14 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - (13 - i));
    return d.toISOString().slice(0, 10);
  });
  const dailyLabels = days.map(d => {
    const dt = new Date(d + "T00:00:00");
    return dt.toLocaleDateString("th-TH", { day: "numeric", month: "short" });
  });
  const dailyValues = days.map(d => dailyMap[d] || 0);

  // Render HTML
  document.getElementById("content").innerHTML = `
    <div class="stats">
      <div class="stat-card highlight" onclick="openModal('revenue')">
        <div class="stat-label">ยอดขายรวม ↗</div>
        <div class="stat-value">${totalRevenue.toLocaleString("th-TH")}</div>
        <div class="stat-unit">THB</div>
      </div>
      <div class="stat-card" onclick="openModal('all')">
        <div class="stat-label">ออเดอร์ทั้งหมด ↗</div>
        <div class="stat-value">${totalOrders.toLocaleString()}</div>
        <div class="stat-unit">รายการ</div>
      </div>
      <div class="stat-card" onclick="openModal('today')">
        <div class="stat-label">วันนี้ต้องจัดส่ง ↗</div>
        <div class="stat-value">${todayOrders.length}</div>
        <div class="stat-unit">ออเดอร์</div>
      </div>
      <div class="stat-card" onclick="openModal('flavors')">
        <div class="stat-label">เฉลี่ยต่อออเดอร์ ↗</div>
        <div class="stat-value">${avgOrder.toLocaleString()}</div>
        <div class="stat-unit">THB</div>
      </div>
    </div>

    <div class="charts">
      <div class="card">
        <h3>📈 ยอดขายรายวัน (14 วันล่าสุด)</h3>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="card">
        <h3>🏆 รสชาติขายดี</h3>
        <canvas id="flavorChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="section-header">
        <h3>🚚 รายการจัดส่งวันนี้</h3>
        <span class="count-badge">${todayOrders.length} ออเดอร์</span>
      </div>
      ${todayOrders.length === 0
        ? '<div class="empty">ยังไม่มีออเดอร์สำหรับวันนี้</div>'
        : todayOrders.map(o => orderRowHTML(o)).join("")
      }
    </div>

    ${upcomingHTML}
  `;

  // Destroy old charts if re-rendering
  if (dailyChart) dailyChart.destroy();
  if (flavorChart) flavorChart.destroy();

  dailyChart = new Chart(document.getElementById("dailyChart"), {
    type: "bar",
    data: {
      labels: dailyLabels,
      datasets: [{
        label: "THB",
        data: dailyValues,
        backgroundColor: days.map(d => d === today ? "rgba(42,159,201,1)" : "rgba(42,159,201,0.5)"),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      plugins: { legend: { display: false }, tooltip: {
        callbacks: { label: ctx => ` ${ctx.raw.toLocaleString("th-TH")} THB` }
      }},
      scales: {
        y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString("th-TH") } },
        x: { ticks: { font: { size: 10 } } }
      }
    }
  });

  flavorChart = new Chart(document.getElementById("flavorChart"), {
    type: "bar",
    data: {
      labels: flavors.map(([name]) => name),
      datasets: [{
        data: flavors.map(([,qty]) => qty),
        backgroundColor: "rgba(212,166,74,0.75)",
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: "y",
      responsive: true,
      plugins: { legend: { display: false } },
      scales: {
        x: { beginAtZero: true, ticks: { stepSize: 1 } },
        y: { ticks: { font: { size: 12 } } }
      }
    }
  });

  const now = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
  document.getElementById("lastUpdated").textContent = `อัพเดต ${now} น.`;
}

let refreshTimer;
async function init() {
  clearTimeout(refreshTimer);
  document.getElementById("lastUpdated").textContent = "กำลังโหลด...";
  try {
    const orders = await loadData();
    render(orders);
    // Auto-refresh every 5 min
    refreshTimer = setTimeout(init, 5 * 60 * 1000);
  } catch(e) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        โหลดข้อมูลไม่ได้ — ตรวจสอบว่า Apps Script deploy ถูกต้องและตั้งสิทธิ์เป็น <b>"ทุกคน"</b><br><br>
        <button onclick="init()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:none;background:#c0392b;color:#fff;cursor:pointer;font-weight:700;">ลองใหม่</button>
      </div>`;
  }
}

if (sessionStorage.getItem("dash_token")) init();
</script>
</body>
</html>
