<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สต็อกสินค้า — Frozen Larna Cake</title>
<link rel="icon" href="/favicon.gif" type="image/gif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
<script>
const API_BASE = "https://larnaapi.yai-taweewoot.workers.dev";

(function(){
  if (!sessionStorage.getItem("dash_token")) {
    document.addEventListener("DOMContentLoaded", function() {
      document.body.style.display = "none";
      var overlay = document.createElement("div");
      overlay.id = "pin-overlay";
      overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:#2B1810;display:flex;align-items:center;justify-content:center;z-index:9999;">
          <div style="background:#fff;border-radius:20px;padding:40px 32px;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);">
            <div style="font-size:32px;margin-bottom:8px;">🔐</div>
            <h2 style="font-size:18px;font-weight:800;color:#2B1810;margin-bottom:4px;">Larna Dashboard</h2>
            <p style="font-size:13px;color:#888;margin-bottom:24px;">กรอก PIN เพื่อเข้าใช้งาน</p>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="6"
              style="width:100%;text-align:center;font-size:28px;letter-spacing:8px;border:2px solid #e0d0c0;border-radius:12px;padding:12px;outline:none;color:#2B1810;"
              placeholder="••••••">
            <p id="pin-error" style="color:#c0392b;font-size:13px;margin-top:12px;display:none;">PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
            <button onclick="checkPin()" style="margin-top:20px;width:100%;background:#2B1810;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.body.style.display = "";
      setTimeout(() => document.getElementById("pin-input").focus(), 100);
      document.getElementById("pin-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") checkPin();
      });
    });
  }
  window.checkPin = async function() {
    var input = document.getElementById("pin-input");
    var errorEl = document.getElementById("pin-error");
    errorEl.style.display = "none";
    try {
      const res = await fetch(API_BASE + "/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: input.value }),
      });
      const data = await res.json();
      if (data.success && data.token) {
        sessionStorage.setItem("dash_token", data.token);
        document.getElementById("pin-overlay").remove();
        init();
      } else {
        errorEl.style.display = "";
        input.value = ""; input.focus();
      }
    } catch (e) {
      errorEl.textContent = "เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง";
      errorEl.style.display = "";
    }
  };
})();
</script>
<style>
  :root {
    --choco-dark: #1C0F08;
    --choco: #4A2C1D;
    --choco-soft: #8A6A54;
    --frost: #3FB6DE;
    --frost-deep: #1E7A9C;
    --cream: #FBF3E7;
    --cream-2: #F0E3D1;
    --gold: #D4A64A;
    --green: #27ae60;
    --sorbet: #E85D4C;
    --sorbet-soft: #FCE7E3;
    --font-display: 'Prompt', sans-serif;
    --font-body: 'Prompt', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-body); background: var(--cream); color: var(--choco-dark); min-height: 100vh; }

  header {
    background: var(--choco-dark);
    color: #fff;
    padding: 12px 28px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header h1 { font-family: var(--font-display); font-size: 19px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  header .nav-logo { height: 32px; width: auto; display: block; }
  .page-tabs { display: flex; gap: 2px; background: rgba(255,255,255,.1); border-radius: 30px; padding: 4px; justify-self: center; flex-wrap: wrap; }
  .page-tab {
    padding: 6px 16px; border-radius: 24px; font-size: 12px; font-weight: 700;
    text-decoration: none; color: rgba(255,255,255,.6); transition: all .2s; white-space: nowrap;
  }
  .page-tab.active { background: var(--frost); color: #fff; }
  .page-tab:not(.active):hover { color: #fff; }
  .header-right { justify-self: end; display: flex; align-items: center; gap: 14px; }
  #lastUpdated { font-size: 12px; opacity: 0.5; }
  .refresh-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .refresh-btn:hover { background: rgba(255,255,255,0.22); }

  .drip-divider {
    position: absolute; left: 0; right: 0; top: 100%; height: 16px;
    background: var(--choco-dark);
    -webkit-mask: radial-gradient(circle at 9px 0, transparent 9px, black 9.5px) repeat-x;
    mask: radial-gradient(circle at 9px 0, transparent 9px, black 9.5px) repeat-x;
    -webkit-mask-size: 18px 16px;
    mask-size: 18px 16px;
    pointer-events: none;
  }

  .container { max-width: 1100px; margin: 0 auto; padding: 28px 20px 60px; }

  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat-card { background: #fff; border-radius: 16px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(43,24,16,0.07); }
  .stat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--choco); opacity: 0.5; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-display); font-size: 34px; font-weight: 700; color: var(--choco-dark); line-height: 1; font-variant-numeric: tabular-nums; }
  .stat-card.warn .stat-value { color: var(--gold); }
  .stat-card.danger .stat-value { color: var(--sorbet); }

  .card { background: #fff; border-radius: 16px; padding: 22px 24px; box-shadow: 0 2px 12px rgba(43,24,16,0.07); margin-bottom: 24px; }
  .card h3 { font-family: var(--font-display); font-size: 17px; font-weight: 600; font-style: italic; margin-bottom: 4px; color: var(--choco-dark); }
  .card .card-sub { font-size: 12.5px; color: var(--choco); opacity: .55; margin-bottom: 18px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 10px; }

  .unlock-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .unlock-row input { padding: 8px 12px; border: 1.5px solid var(--cream-2); border-radius: 10px; font-family: inherit; font-size: 13px; outline: none; width: 180px; }
  .unlock-row input:focus { border-color: var(--frost); }
  .unlock-btn { background: var(--choco-dark); color: #fff; border: none; border-radius: 10px; padding: 8px 16px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .unlock-btn:hover { opacity: .9; }
  .unlocked-tag { font-size: 12px; font-weight: 700; color: var(--green); background: #d4edda; padding: 4px 12px; border-radius: 999px; }

  table.stock-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .stock-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--choco); opacity: .5; padding: 0 10px 10px; }
  .stock-table td { padding: 10px; font-size: 13.5px; border-top: 1px solid var(--cream-2); vertical-align: middle; }
  .stock-table img { width: 42px; height: 42px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
  .row-name { display: flex; align-items: center; gap: 10px; font-weight: 700; }
  .row-name small { display: block; font-weight: 400; opacity: .5; font-size: 11px; }
  .stock-input { width: 68px; padding: 6px 8px; border: 1.5px solid var(--cream-2); border-radius: 8px; font-size: 13.5px; font-family: inherit; }
  .stock-input:disabled { background: var(--cream); opacity: .5; }
  .note-input { width: 140px; padding: 6px 8px; border: 1.5px solid var(--cream-2); border-radius: 8px; font-size: 13px; font-family: inherit; }
  .note-input:disabled { background: var(--cream); opacity: .5; }
  .save-btn { background: var(--choco-dark); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 12.5px; font-weight: 700; cursor: pointer; }
  .save-btn:disabled { opacity: .35; cursor: not-allowed; }

  .stock-status { font-weight: 700; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; white-space: nowrap; }
  .stock-status.ok { background: #d4edda; color: #155724; }
  .stock-status.low { background: #F7E7C4; color: #8A6215; }
  .stock-status.out { background: var(--sorbet-soft); color: var(--sorbet); }

  .row-msg { font-size: 12px; margin-top: 4px; }
  .row-msg.err { color: var(--sorbet); }
  .row-msg.ok { color: var(--green); }

  table.log-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
  .log-table th { text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--choco); opacity: .5; padding: 0 10px 10px; }
  .log-table td { padding: 9px 10px; font-size: 13px; border-top: 1px solid var(--cream-2); }
  .empty { text-align: center; color: var(--choco); opacity: .35; padding: 32px 0; font-size: 14px; }
  .error-state { background: #fff0f0; border-radius: 16px; padding: 28px; text-align: center; color: #c0392b; font-size: 14px; margin-top: 20px; }

  @media (max-width: 680px) {
    header { grid-template-columns: 1fr; justify-items: center; text-align: center; }
    .header-right { justify-self: center; }
    .stats { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1><img class="nav-logo" src="/larna-logo.jpg" alt="Larna Frozen Cake">📦 สต็อกสินค้า</h1>
  <div class="page-tabs">
    <a href="/dashboard.html" class="page-tab">ยอดสั่งซื้อ</a>
    <a href="/customers.html" class="page-tab">ประวัติลูกค้า</a>
    <a href="/accounting.html" class="page-tab">บัญชี</a>
    <span class="page-tab active">สต็อกสินค้า</span>
  </div>
  <div class="header-right">
    <span id="lastUpdated">กำลังโหลด...</span>
    <button class="refresh-btn" onclick="init()">🔄 รีเฟรช</button>
  </div>
  <div class="drip-divider" aria-hidden="true"></div>
</header>

<div class="container" id="content">
  <div class="stats" id="statsRow"></div>

  <div class="card">
    <div class="section-header">
      <div>
        <h3>คลังสินค้า</h3>
        <div class="card-sub">แก้ไขจำนวนสต็อกสินค้าแต่ละรายการ</div>
      </div>
      <div id="unlockZone"></div>
    </div>
    <table class="stock-table">
      <thead>
        <tr>
          <th>สินค้า</th>
          <th>ราคา</th>
          <th>คงเหลือ</th>
          <th>สถานะ</th>
          <th>แก้ไขจำนวน</th>
          <th>หมายเหตุ</th>
          <th></th>
          <th>อัปเดตล่าสุด</th>
        </tr>
      </thead>
      <tbody id="stockBody"></tbody>
    </table>
  </div>

  <div class="card">
    <h3>ประวัติการปรับสต็อก</h3>
    <div class="card-sub">ปลดล็อกเพื่อดูประวัติย้อนหลัง</div>
    <table class="log-table">
      <thead>
        <tr>
          <th>เวลา</th>
          <th>สินค้า</th>
          <th>เดิม → ใหม่</th>
          <th>เปลี่ยนแปลง</th>
          <th>หมายเหตุ</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<script src="/js/products.js"></script>
<script src="/js/inventory-config.js"></script>
<script>
const LOW_STOCK_DEFAULT_THRESHOLD = 5;

function getAdminKey(){ return sessionStorage.getItem("larna_admin_key") || ""; }
function setAdminKey(key){ sessionStorage.setItem("larna_admin_key", key); }
function clearAdminKey(){ sessionStorage.removeItem("larna_admin_key"); }

async function apiGet(params){
  const url = new URL(INVENTORY_API_URL);
  Object.keys(params).forEach(k => url.searchParams.set(k, params[k]));
  const res = await fetch(url.toString(), { cache: "no-store" });
  return res.json();
}

async function apiPost(payload){
  const res = await fetch(INVENTORY_API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload)
  });
  return res.json();
}

let stockById = {};

function stockStatus(stock, threshold){
  if (stock <= 0) return { label: "หมด", cls: "out" };
  if (stock <= (threshold || LOW_STOCK_DEFAULT_THRESHOLD)) return { label: "ใกล้หมด", cls: "low" };
  return { label: "ปกติ", cls: "ok" };
}

function renderUnlockZone(){
  const zone = document.getElementById("unlockZone");
  if (getAdminKey()) {
    zone.innerHTML = `<span class="unlocked-tag">✓ ปลดล็อกแล้ว</span>`;
    return;
  }
  zone.innerHTML = `
    <div class="unlock-row">
      <input type="password" id="unlockInput" placeholder="รหัสแก้ไขสต็อก (ADMIN_KEY)">
      <button class="unlock-btn" onclick="unlock()">ปลดล็อก</button>
    </div>`;
}

async function unlock(){
  const val = document.getElementById("unlockInput").value.trim();
  if (!val) return;
  setAdminKey(val);
  const data = await apiGet({ action: "log", key: val });
  if (data.error) {
    clearAdminKey();
    document.getElementById("unlockZone").innerHTML = `
      <div class="unlock-row">
        <input type="password" id="unlockInput" placeholder="รหัสแก้ไขสต็อก (ADMIN_KEY)">
        <button class="unlock-btn" onclick="unlock()">ปลดล็อก</button>
      </div>
      <div class="row-msg err">รหัสไม่ถูกต้อง</div>`;
    return;
  }
  renderUnlockZone();
  renderStockTable();
  renderLog(data);
}

function renderStats(){
  const list = Object.values(stockById);
  const total = PRODUCTS.length;
  const out = PRODUCTS.filter(p => (stockById[p.id]?.stock ?? 0) <= 0).length;
  const low = PRODUCTS.filter(p => {
    const s = stockById[p.id];
    if (!s) return false;
    return s.stock > 0 && s.stock <= (s.threshold || LOW_STOCK_DEFAULT_THRESHOLD);
  }).length;
  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="stat-label">สินค้าทั้งหมด</div><div class="stat-value">${total}</div></div>
    <div class="stat-card warn"><div class="stat-label">ใกล้หมด</div><div class="stat-value">${low}</div></div>
    <div class="stat-card danger"><div class="stat-label">สินค้าหมด</div><div class="stat-value">${out}</div></div>
  `;
}

function renderStockTable(){
  const unlocked = !!getAdminKey();
  document.getElementById("stockBody").innerHTML = PRODUCTS.map(p => {
    const s = stockById[p.id] || { stock: 0, threshold: LOW_STOCK_DEFAULT_THRESHOLD, lastUpdated: "" };
    const status = stockStatus(s.stock, s.threshold);
    const updated = s.lastUpdated ? new Date(s.lastUpdated).toLocaleString("th-TH") : "—";
    return `
      <tr>
        <td>
          <div class="row-name">
            <img src="${p.img}" alt="">
            <div>${p.name.th}<small>${p.id}</small></div>
          </div>
        </td>
        <td>${p.price} THB</td>
        <td>${s.stock} ชิ้น</td>
        <td><span class="stock-status ${status.cls}">${status.label}</span></td>
        <td><input type="number" class="stock-input" id="stock-${p.id}" value="${s.stock}" ${unlocked ? "" : "disabled"}></td>
        <td><input type="text" class="note-input" id="note-${p.id}" placeholder="เช่น รับของเข้าใหม่" ${unlocked ? "" : "disabled"}></td>
        <td><button class="save-btn" onclick="saveStock('${p.id}')" ${unlocked ? "" : "disabled"}>บันทึก</button></td>
        <td style="font-size:11.5px;opacity:.5;">${updated}</td>
      </tr>
      <tr><td colspan="8" style="padding:0;border:none;"><div class="row-msg" id="rowmsg-${p.id}"></div></td></tr>
    `;
  }).join("");
}

async function saveStock(id){
  const input = document.getElementById(`stock-${id}`);
  const note = document.getElementById(`note-${id}`).value.trim();
  const newStock = Number(input.value);
  const msgEl = document.getElementById(`rowmsg-${id}`);
  msgEl.textContent = "กำลังบันทึก...";
  msgEl.className = "row-msg";
  const result = await apiPost({ key: getAdminKey(), action: "setStock", id, newStock, note });
  if (result.error) {
    msgEl.textContent = "เกิดข้อผิดพลาด: " + result.error;
    msgEl.className = "row-msg err";
    if (result.error === "unauthorized") { clearAdminKey(); renderUnlockZone(); renderStockTable(); }
    return;
  }
  msgEl.textContent = "บันทึกแล้ว";
  msgEl.className = "row-msg ok";
  await loadStock();
  if (getAdminKey()) {
    const data = await apiGet({ action: "log", key: getAdminKey() });
    renderLog(data);
  }
}

function renderLog(data){
  if (!getAdminKey()) {
    document.getElementById("logBody").innerHTML = `<tr><td colspan="5" class="empty">ปลดล็อกเพื่อดูประวัติ</td></tr>`;
    return;
  }
  if (!data || data.error) {
    document.getElementById("logBody").innerHTML = `<tr><td colspan="5" class="empty">ไม่สามารถโหลดประวัติได้</td></tr>`;
    return;
  }
  const rows = (data.log || []).slice(0, 100);
  document.getElementById("logBody").innerHTML = rows.map(l => {
    const p = PRODUCTS.find(x => x.id === l.id);
    const name = p ? p.name.th : l.id;
    const time = l.timestamp ? new Date(l.timestamp).toLocaleString("th-TH") : "";
    const delta = Number(l.delta) > 0 ? `+${l.delta}` : l.delta;
    return `
      <tr>
        <td>${time}</td>
        <td>${name}</td>
        <td>${l.oldStock} → ${l.newStock}</td>
        <td>${delta}</td>
        <td>${l.note || ""}</td>
      </tr>
    `;
  }).join("") || `<tr><td colspan="5" class="empty">ยังไม่มีประวัติ</td></tr>`;
}

async function loadStock(){
  const data = await apiGet({ action: "stock" });
  stockById = {};
  (data.products || []).forEach(p => { stockById[p.id] = p; });
  renderStats();
  renderStockTable();
}

async function init(){
  document.getElementById("lastUpdated").textContent = "กำลังโหลด...";
  if (!INVENTORY_API_URL) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">ยังไม่ได้ตั้งค่า INVENTORY_API_URL ใน js/inventory-config.js กรุณา deploy Google Apps Script ก่อนใช้งาน</div>`;
    return;
  }
  try {
    renderUnlockZone();
    await loadStock();
    if (getAdminKey()) {
      const data = await apiGet({ action: "log", key: getAdminKey() });
      renderLog(data);
    } else {
      renderLog(null);
    }
    const now = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("lastUpdated").textContent = `อัพเดต ${now} น.`;
  } catch (e) {
    document.getElementById("content").innerHTML = `
      <div class="error-state">
        โหลดข้อมูลไม่ได้ — ตรวจสอบการตั้งค่า Google Apps Script<br><br>
        <button onclick="init()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:none;background:#c0392b;color:#fff;cursor:pointer;font-weight:700;">ลองใหม่</button>
      </div>`;
  }
}

if (sessionStorage.getItem("dash_token")) init();
</script>
</body>
</html>
