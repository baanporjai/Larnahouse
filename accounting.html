<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บัญชี — Frozen Larna Cake</title>
<link rel="icon" href="/favicon.gif" type="image/gif">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,600&display=swap" rel="stylesheet">
<script>
const API_BASE = "https://larnaapi.yai-taweewoot.workers.dev";

(function(){
  if (!sessionStorage.getItem("dash_token")) {
    document.addEventListener("DOMContentLoaded", function() {
      document.body.style.display = "none";
      var overlay = document.createElement("div");
      overlay.id = "pin-overlay";
      overlay.innerHTML = `
        <div style="position:fixed;inset:0;background:#2B1810;display:flex;align-items:center;justify-content:center;z-index:9999;">
          <div style="background:#fff;border-radius:20px;padding:40px 32px;width:320px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.3);">
            <div style="font-size:32px;margin-bottom:8px;">🔐</div>
            <h2 style="font-size:18px;font-weight:800;color:#2B1810;margin-bottom:4px;">Larna Dashboard</h2>
            <p style="font-size:13px;color:#888;margin-bottom:24px;">กรอก PIN เพื่อเข้าใช้งาน</p>
            <input id="pin-input" type="password" inputmode="numeric" maxlength="6"
              style="width:100%;text-align:center;font-size:28px;letter-spacing:8px;border:2px solid #e0d0c0;border-radius:12px;padding:12px;outline:none;color:#2B1810;"
              placeholder="••••••">
            <p id="pin-error" style="color:#c0392b;font-size:13px;margin-top:12px;display:none;">PIN ไม่ถูกต้อง ลองใหม่อีกครั้ง</p>
            <button onclick="checkPin()" style="margin-top:20px;width:100%;background:#2B1810;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      document.body.style.display = "";
      setTimeout(() => document.getElementById("pin-input").focus(), 100);
      document.getElementById("pin-input").addEventListener("keydown", function(e) {
        if (e.key === "Enter") checkPin();
      });
    });
  }
  window.checkPin = async function() {
    var input = document.getElementById("pin-input");
    var errorEl = document.getElementById("pin-error");
    errorEl.style.display = "none";
    try {
      const res = await fetch(API_BASE + "/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ pin: input.value }),
      });
      const data = await res.json();
      if (data.success && data.token) {
        sessionStorage.setItem("dash_token", data.token);
        document.getElementById("pin-overlay").remove();
        init();
      } else {
        errorEl.style.display = "";
        input.value = ""; input.focus();
      }
    } catch (e) {
      errorEl.textContent = "เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง";
      errorEl.style.display = "";
    }
  };
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

  @media (max-width: 500px) {

</style>

<script>
function parseTimestamp(str) {
  if (!str || str === "-") return null;
  // Thai locale format: "D/M/YYYY HH:MM:SS" with Buddhist year (e.g. "2/7/2569 17:37:21")
  // ต้องเช็ค pattern นี้ก่อนเสมอ — new Date(str) ของเบราว์เซอร์จะตีความ "D/M" แบบอเมริกา (M/D)
  // แบบเงียบๆ ทุกครั้งที่ D <= 12 (คือ valid ทั้งสองแบบ) ทำให้ได้วันที่ผิดโดยไม่มี error ให้เห็นเลย
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})[,\s]+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
  if (m) {
    const year = parseInt(m[3]) > 2500 ? parseInt(m[3]) - 543 : parseInt(m[3]);
    return new Date(year, parseInt(m[2]) - 1, parseInt(m[1]), parseInt(m[4]), parseInt(m[5]), parseInt(m[6] || 0));
  }
  const d = new Date(str);
  if (!isNaN(d)) {
    if (d.getFullYear() > 2500) {
      return new Date(d.getFullYear() - 543, d.getMonth(), d.getDate(), d.getHours(), d.getMinutes(), d.getSeconds());
    }
    return d;
  }
  return null;
}

function parseTotal(str) {
  return parseInt((str || "0").toString().replace(/[^0-9]/g, "")) || 0;
}

function monthKey(d) { return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`; }

function formatDateISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
}

// DD/MM/YYYY ปีพ.ศ. (เช่น "10/07/2569") — สำหรับแสดงผล ต่างจาก formatDateISO ที่ใช้กับ <input type="date">
function formatDateDMY(date) {
  const pad = n => String(n).padStart(2, "0");
  return `${pad(date.getDate())}/${pad(date.getMonth() + 1)}/${date.getFullYear() + 543}`;
}

function escapeHtml(s) {
  return (s || "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

const CATEGORIES = {
  cogs: ["วัตถุดิบ (แป้ง/ครีม/ผลไม้)", "บรรจุภัณฑ์/กล่องเค้ก", "ค่าขนส่งวัตถุดิบ", "ต้นทุนอื่นๆ"],
  opex: ["ค่าเช่า/ค่าน้ำค่าไฟครัว", "ค่าแรง", "ค่าจัดส่ง/ค่าน้ำมัน", "การตลาด/โฆษณา", "ค่าธรรมเนียมการชำระเงิน", "อื่นๆ"],
};
const CAT_COLORS = ["#3FB6DE", "#D4A64A", "#E85D4C", "#27ae60", "#8A6A54", "#1E7A9C", "#6B3FA0", "#4A2C1D"];

async function loadOrders() {
  const token = sessionStorage.getItem("dash_token");
  const res = await fetch(API_BASE + "/api/admin/orders", { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 401) throw new Error("unauthorized");
  const json = await res.json();
  return (json.orders || []).map(o => {
    const normalized = {};
    Object.keys(o).forEach(k => normalized[k.toLowerCase()] = o[k]);
    return normalized;
  });
}

async function loadExpenses() {
  const token = sessionStorage.getItem("dash_token");
  const res = await fetch(API_BASE + "/api/admin/expenses", { headers: { Authorization: `Bearer ${token}` } });
  if (res.status === 401) throw new Error("unauthorized");
  const json = await res.json();
  return (json.expenses || []).map(e => {
    const normalized = {};
    Object.keys(e).forEach(k => normalized[k.toLowerCase()] = e[k]);
    normalized.amount = parseFloat(normalized.amount) || 0;
    normalized.type = normalized.type === "cogs" ? "cogs" : "opex";
    return normalized;
  });
}

function computeMonthlyPL(orderRows, expenseRows) {
  const months = {};
  const ensure = k => months[k] || (months[k] = { revenue: 0, cogs: 0, opex: 0 });
  orderRows.forEach(o => {
    const ts = parseTimestamp(o.timestamp);
    if (!ts) return;
    ensure(monthKey(ts)).revenue += parseTotal(o.total);
  });
  expenseRows.forEach(r => {
    if (!r.date) return;
    const d = new Date(r.date + "T00:00:00");
    if (isNaN(d)) return;
    const b = ensure(monthKey(d));
    if (r.type === "cogs") b.cogs += r.amount; else b.opex += r.amount;
  });
  return months;
}

let currentMonth = null;
function populateMonthFilter() {
  const keys = Object.keys(window._months || {}).sort();
  const sel = document.getElementById("pnlMonthFilter");
  const keepVal = currentMonth;

  const effectiveKeys = keys.length ? keys : [monthKey(new Date())];
  sel.innerHTML = effectiveKeys.slice().reverse().map(k => {
    const [y, m] = k.split("-");
    const label = new Date(+y, +m - 1, 1).toLocaleDateString("th-TH", { month: "long", year: "numeric" });
    return `<option value="${k}">${label}</option>`;
  }).join("");

  const stillExists = effectiveKeys.includes(keepVal);
  currentMonth = stillExists ? keepVal : effectiveKeys[effectiveKeys.length - 1];
  sel.value = currentMonth;
}
function onMonthChange(val) { currentMonth = val; renderAll(); }

function animateNum(id, target) {
  const el = document.getElementById(id);
  if (!el) return;
  const steps = 30, interval = 700 / steps; let step = 0;
  const tick = () => {
    step++; const p = Math.min(step / steps, 1), ease = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(ease * target).toLocaleString("th-TH");
    if (p < 1) setTimeout(tick, interval);
  };
  setTimeout(tick, 16);
}

const charts = {};
function destroyChart(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }

function renderAll() {
  renderKPIs();
  renderTrendChart();
  renderCategoryCharts();
  renderExpenseList();
}

function renderKPIs() {
  const b = (window._months && window._months[currentMonth]) || { revenue: 0, cogs: 0, opex: 0 };
  const gross = b.revenue - b.cogs;
  const net = gross - b.opex;
  const margin = b.revenue > 0 ? (net / b.revenue * 100) : 0;

  animateNum("kpiRevenue", b.revenue);
  animateNum("kpiCogs", b.cogs);
  animateNum("kpiGrossProfit", gross);
  animateNum("kpiOpex", b.opex);
  animateNum("kpiNetProfit", net);
  document.getElementById("kpiNetMargin").textContent = margin.toFixed(1) + "%";

  const npEl = document.getElementById("kpiNetProfit");
  npEl.classList.toggle("negative", net < 0);
  const gpEl = document.getElementById("kpiGrossProfit");
  gpEl.classList.toggle("negative", gross < 0);
}

function renderTrendChart() {
  destroyChart("trend");
  const keys = Object.keys(window._months || {}).sort().slice(-6);
  if (keys.length === 0) return;

  const labels = keys.map(k => {
    const [y, m] = k.split("-");
    return new Date(+y, +m - 1, 1).toLocaleDateString("th-TH", { month: "short", year: "2-digit" });
  });
  const revenue = keys.map(k => window._months[k].revenue);
  const cogs = keys.map(k => window._months[k].cogs);
  const opex = keys.map(k => window._months[k].opex);
  const net = keys.map(k => window._months[k].revenue - window._months[k].cogs - window._months[k].opex);

  const canvas = document.getElementById("chartTrend");
  if (!canvas) return;
  charts.trend = new Chart(canvas, {
    data: {
      labels,
      datasets: [
        { type: "bar", label: "รายได้", data: revenue, backgroundColor: "rgba(63,182,222,0.65)", borderRadius: 6, order: 2 },
        { type: "bar", label: "ต้นทุน (COGS)", data: cogs, backgroundColor: "rgba(212,166,74,0.75)", borderRadius: 6, order: 2 },
        { type: "bar", label: "รายจ่าย (OPEX)", data: opex, backgroundColor: "rgba(232,93,76,0.65)", borderRadius: 6, order: 2 },
        { type: "line", label: "กำไรสุทธิ", data: net, borderColor: "#1C0F08", backgroundColor: "#1C0F08", tension: .3, pointRadius: 4, pointBackgroundColor: "#1C0F08", order: 1 },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: true, position: "bottom", labels: { font: { size: 11 }, color: "#4A2C1D" } },
        tooltip: { callbacks: { label: c => ` ${c.dataset.label}: ${c.raw.toLocaleString("th-TH")} THB` } },
      },
      scales: {
        y: { ticks: { callback: v => v.toLocaleString("th-TH") } },
        x: { ticks: { font: { size: 10 } } },
      },
    },
  });
}

function renderCategoryCharts() {
  destroyChart("cogsCat");
  destroyChart("opexCat");
  const rows = (window._expenses || []).filter(r => r.date && monthKey(new Date(r.date + "T00:00:00")) === currentMonth);
  buildDoughnut("chartCogsCat", "cogsCat", rows, "cogs");
  buildDoughnut("chartOpexCat", "opexCat", rows, "opex");
}

function buildDoughnut(canvasId, chartKey, rows, type) {
  const filtered = rows.filter(r => r.type === type);
  const byCategory = {};
  filtered.forEach(r => {
    const key = r.category || "ไม่ระบุ";
    byCategory[key] = (byCategory[key] || 0) + r.amount;
  });
  const entries = Object.entries(byCategory).sort((a, b) => b[1] - a[1]);
  const canvas = document.getElementById(canvasId);
  const emptyEl = document.getElementById(canvasId + "Empty");
  if (!canvas) return;

  if (entries.length === 0) {
    canvas.style.display = "none";
    if (emptyEl) emptyEl.style.display = "block";
    return;
  }
  canvas.style.display = "";
  if (emptyEl) emptyEl.style.display = "none";

  charts[chartKey] = new Chart(canvas, {
    type: "doughnut",
    data: {
      labels: entries.map(([c]) => c),
      datasets: [{
        data: entries.map(([, v]) => v),
        backgroundColor: entries.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]),
        borderWidth: 2, borderColor: "#fff",
      }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: "bottom", labels: { font: { size: 10.5 }, color: "#4A2C1D", boxWidth: 12, padding: 10 } },
        tooltip: { callbacks: { label: c => ` ${c.label}: ${c.raw.toLocaleString("th-TH")} THB` } },
      },
    },
  });
}

function renderExpenseList() {
  const rows = (window._expenses || []).filter(r => r.date && monthKey(new Date(r.date + "T00:00:00")) === currentMonth)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  const listEl = document.getElementById("expenseList");
  if (!listEl) return;

  if (rows.length === 0) {
    listEl.innerHTML = `<div class="empty">ยังไม่มีรายการในเดือนนี้</div>`;
    return;
  }

  listEl.innerHTML = rows.map(r => `
    <div class="order-row" onclick="openExpenseModal('${r.id}')">
      <div>
        <span class="type-badge ${r.type}">${r.type === "cogs" ? "ต้นทุน" : "รายจ่าย"}</span>
        <div class="order-name">${escapeHtml(r.category)}${r.description ? " — " + escapeHtml(r.description) : ""}</div>
        <div class="order-meta">${formatDateDMY(new Date(r.date + "T00:00:00"))}</div>
      </div>
      <div class="order-total">${r.amount.toLocaleString("th-TH")} THB</div>
      <button class="del-btn" onclick="event.stopPropagation(); deleteExpenseRow('${r.id}')" title="ลบ">🗑️</button>
    </div>`).join("");
}

let editingExpenseId = null;

function openExpenseModal(id) {
  editingExpenseId = id || null;
  const r = id ? (window._expenses || []).find(x => x.id === id) : null;

  document.getElementById("expenseModalTitle").textContent = r ? "แก้ไขรายการ" : "เพิ่มรายการ";
  document.getElementById("expenseType").value = r ? r.type : "cogs";
  onExpenseTypeChange(r ? r.category : null);
  document.getElementById("expenseDesc").value = r ? (r.description || "") : "";
  document.getElementById("expenseAmount").value = r ? r.amount : "";
  document.getElementById("expenseDate").value = r ? r.date : formatDateISO(new Date());
  document.getElementById("expenseNote").value = r ? (r.note || "") : "";
  document.getElementById("deleteExpenseBtn").style.display = r ? "inline-block" : "none";

  document.getElementById("expenseModal").classList.add("open");
}
function closeExpenseModal() {
  document.getElementById("expenseModal").classList.remove("open");
  editingExpenseId = null;
}
function onExpenseTypeChange(presetCategory) {
  const type = document.getElementById("expenseType").value;
  const sel = document.getElementById("expenseCategory");
  sel.innerHTML = CATEGORIES[type].map(c => `<option value="${c}">${c}</option>`).join("");
  if (presetCategory && CATEGORIES[type].includes(presetCategory)) sel.value = presetCategory;
}
function generateId() {
  return Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8);
}

async function postExpense(payload) {
  const token = sessionStorage.getItem("dash_token");
  try {
    const res = await fetch(API_BASE + "/api/admin/expenses", {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body: JSON.stringify(payload),
    });
    if (res.status === 401) {
      sessionStorage.removeItem("dash_token");
      location.reload();
      return { success: false };
    }
    const data = await res.json();
    if (!data.success) alert("บันทึกไม่สำเร็จ ลองใหม่อีกครั้ง");
    return data;
  } catch (e) {
    alert("เชื่อมต่อไม่สำเร็จ ลองใหม่อีกครั้ง");
    return { success: false };
  }
}

async function saveExpense(e) {
  e.preventDefault();
  const type = document.getElementById("expenseType").value;
  const category = document.getElementById("expenseCategory").value;
  const description = document.getElementById("expenseDesc").value.trim();
  const amount = parseFloat(document.getElementById("expenseAmount").value);
  const date = document.getElementById("expenseDate").value;
  const note = document.getElementById("expenseNote").value.trim();

  if (!category || !amount || amount <= 0 || !date) {
    alert("กรุณากรอกหมวดหมู่ จำนวนเงิน และวันที่ให้ครบ");
    return;
  }

  const submitBtn = document.getElementById("expenseSubmitBtn");
  submitBtn.disabled = true;
  try {
    const id = editingExpenseId || generateId();
    const payload = { action: editingExpenseId ? "update" : "add", id, type, category, description, amount, date, note };
    const result = await postExpense(payload);
    if (result && result.success !== false) {
      closeExpenseModal();
      window._expenses = await loadExpenses();
      window._months = computeMonthlyPL(window._orders || [], window._expenses || []);
      populateMonthFilter();
      renderAll();
    }
  } finally {
    submitBtn.disabled = false;
  }
}

async function deleteExpenseRow(id) {
  if (!id || !confirm("ยืนยันการลบรายการนี้?")) return;
  const result = await postExpense({ action: "delete", id });
  if (result && result.success !== false) {
    closeExpenseModal();
    window._expenses = await loadExpenses();
    window._months = computeMonthlyPL(window._orders || [], window._expenses || []);
    populateMonthFilter();
    renderAll();
  }
}

  document.getElementById("content").innerHTML = `
    <div class="stats">
      <div class="stat-card">

        <div class="stat-value" id="kpiRevenue">—</div>

      </div>

    <div class="card" style="margin-bottom:20px;">
      <h3>📈 แนวโน้มรายเดือน (6 เดือนล่าสุด)</h3>
      <canvas id="chartTrend" height="90"></canvas>
    </div>

    <div class="dual-card">
      <div class="card">
        <h3>🍰 ต้นทุนแยกตามหมวด</h3>

        <div class="chart-empty" id="chartCogsCatEmpty">ยังไม่มีรายการต้นทุนในเดือนนี้</div>

}

async function init() {
  document.getElementById("lastUpdated").textContent = "กำลังโหลด...";
  try {
    const [orders, expenses] = await Promise.all([loadOrders(), loadExpenses()]);
    window._orders = orders;
    window._expenses = expenses;
    window._months = computeMonthlyPL(orders, expenses);

    renderLayout();
    populateMonthFilter();
    renderAll();

    const now = new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" });
    document.getElementById("lastUpdated").textContent = `อัพเดต ${now} น.`;
  } catch (e) {
    if (e.message === "unauthorized") {
      sessionStorage.removeItem("dash_token");
      location.reload();
      return;
    }
    console.error(e);
    document.getElementById("content").innerHTML = `
      <div class="card" style="text-align:center;color:#c0392b;">
        โหลดข้อมูลไม่ได้ — ลองรีเฟรชอีกครั้ง<br><br>
        <button onclick="init()" style="margin-top:12px;padding:8px 20px;border-radius:8px;border:none;background:#c0392b;color:#fff;cursor:pointer;font-weight:700;">ลองใหม่</button>
      </div>`;
  }
}

if (sessionStorage.getItem("dash_token")) init();
</script>
